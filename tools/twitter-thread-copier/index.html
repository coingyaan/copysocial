<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>Twitter Thread Copier – Copy X Threads Instantly</title>

<meta name="description" content="Free Twitter thread copier. Extract and copy full X threads instantly for research, writing, and content inspiration.">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="/assets/images/favicon/05-favicon-32x32.png">

<style>

body{
font-family:Arial;
background:#0f172a;
color:#e2e8f0;
margin:0;
}

header{
padding:20px 40px;
background:#111827;
border-bottom:1px solid #1e293b;
}

.container{
max-width:800px;
margin:auto;
padding:40px 20px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:10px;
margin-top:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
}

textarea{
width:100%;
height:180px;
margin-top:12px;
padding:10px;
}

button{
padding:10px 16px;
border-radius:6px;
border:none;
cursor:pointer;
margin-top:10px;
}

.primary{
background:#2563eb;
color:white;
}

.footer{
text-align:center;
margin-top:60px;
padding:30px;
border-top:1px solid #1e293b;
}

</style>

</head>

<body>

<header>

<a href="/">
<img src="/assets/images/logo/header-800x200-transparent.png" style="height:36px;filter:brightness(1.8);">
</a>

</header>

<div class="container">

<h1>Twitter / X Thread Copier</h1>

<p>Extract and copy full Twitter threads instantly.</p>

<div class="card">

<input id="url" placeholder="Paste Twitter thread URL here">

<button class="primary" onclick="extractThread()">
Extract Thread
</button>

<textarea id="output" placeholder="Thread text will appear here..."></textarea>

<button onclick="copyText()">Copy Thread</button>

</div>

</div>

<footer class="footer">

<p>Built by <a href="https://linkedin.com/in/moneshkumar">Monesh Kumar ❤️</a></p>

<p>© 2026 CopySocial</p>

<a href="/about">About</a> |
<a href="/privacy-policy">Privacy Policy</a> |
<a href="/disclaimer">Disclaimer</a> |
<a href="/contact">Contact</a>

</footer>

<script>

async function extractThread(){

const url=document.getElementById("url").value
const output=document.getElementById("output")

if(!url){
alert("Paste Twitter thread URL")
return
}

output.value="Extracting thread..."

try{

const res=await fetch(
"https://publish.twitter.com/oembed?url="+encodeURIComponent(url)
)

const data=await res.json()

output.value=data.html.replace(/<[^>]*>/g,'')

}catch{

output.value="Could not extract thread"

}

}

function copyText(){

const output=document.getElementById("output")

output.select()

document.execCommand("copy")

alert("Thread copied!")

}

</script>

</body>
</html>
